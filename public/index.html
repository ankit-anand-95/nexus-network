<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Nexus — Professional Network</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%236366f1'/><text x='50' y='72' font-family='Arial Black,sans-serif' font-size='62' font-weight='900' text-anchor='middle' fill='white'>N</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--primary:#6366f1;--primary-dark:#4f46e5;--secondary:#8b5cf6;--bg:#f3f4f8;--card:#fff;--text:#1e1b3a;--sub:#6b7280;--border:#e5e7eb;--inp:#f9fafb;--indigo-light:#eef2ff;--r:16px;--r-sm:10px;--shadow:0 2px 12px rgba(99,102,241,.08)}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);transition:background .2s,color .2s}
body.dark{--bg:#0f0e1a;--card:#1a1830;--text:#e8e6f0;--sub:#9ca3af;--border:#2d2b45;--inp:#221f3a;--indigo-light:#1e1b3a;--shadow:0 2px 12px rgba(0,0,0,.4)}
/* ── VISUAL TEMPLATES — full background + accent + card + text ── */
body.tmpl-executive{--bg:#070c18;--card:#0d1425;--text:#e8ecf8;--sub:#7a8aaa;--border:#182040;--inp:#0a1020;--primary:#c9a227;--primary-dark:#a8851e;--secondary:#e8c547;--indigo-light:#1a1508;--shadow:0 2px 20px rgba(0,0,0,.6)}
body.tmpl-executive nav{background:linear-gradient(90deg,#0a1020,#0d1830);border-bottom:1px solid #c9a22730}
body.tmpl-executive .logo-icon{background:linear-gradient(135deg,#c9a227,#e8c547)}
body.tmpl-slate{--bg:#141b2d;--card:#1e2840;--text:#dde4f8;--sub:#7888aa;--border:#26334f;--inp:#141b2d;--primary:#4f8ef7;--primary-dark:#2d6ef0;--secondary:#7eb3ff;--indigo-light:#162050;--shadow:0 2px 16px rgba(0,0,0,.5)}
body.tmpl-slate nav{background:#1a2238;border-bottom:1px solid #26334f}
body.tmpl-slate .logo-icon{background:linear-gradient(135deg,#4f8ef7,#7eb3ff)}
body.tmpl-parchment{--bg:#f2ece0;--card:#faf6ee;--text:#2a1f0e;--sub:#7a6548;--border:#d8ccb4;--inp:#fff9f0;--primary:#92400e;--primary-dark:#78350f;--secondary:#b45309;--indigo-light:#fde68a;--shadow:0 2px 12px rgba(80,50,0,.12)}
body.tmpl-parchment nav{background:#faf6ee;border-bottom:1px solid #d8ccb4}
body.tmpl-parchment .logo-icon{background:linear-gradient(135deg,#92400e,#b45309)}
body.tmpl-arctic{--bg:#edf2f7;--card:#ffffff;--text:#1a2535;--sub:#4a6080;--border:#ccd8e8;--inp:#f4f8fc;--primary:#0d9488;--primary-dark:#0f766e;--secondary:#14b8a6;--indigo-light:#ccfbf1;--shadow:0 2px 12px rgba(13,148,136,.09)}
body.tmpl-arctic nav{background:#ffffff;border-bottom:1px solid #ccd8e8}
body.tmpl-arctic .logo-icon{background:linear-gradient(135deg,#0d9488,#14b8a6)}
body.tmpl-carbon{--bg:#0a0a0a;--card:#141414;--text:#f0f0f0;--sub:#808080;--border:#242424;--inp:#0f0f0f;--primary:#22c55e;--primary-dark:#16a34a;--secondary:#4ade80;--indigo-light:#052e16;--shadow:0 2px 20px rgba(0,0,0,.7)}
body.tmpl-carbon nav{background:#0d0d0d;border-bottom:1px solid #1e1e1e}
body.tmpl-carbon .logo-icon{background:linear-gradient(135deg,#16a34a,#22c55e)}
body.tmpl-graphite{--bg:#16181f;--card:#1e2130;--text:#dce0f0;--sub:#808aaa;--border:#282d3e;--inp:#16181f;--primary:#a855f7;--primary-dark:#9333ea;--secondary:#c084fc;--indigo-light:#2e1a40;--shadow:0 2px 16px rgba(0,0,0,.5)}
body.tmpl-graphite nav{background:#1a1c28;border-bottom:1px solid #2a2d3e}
body.tmpl-graphite .logo-icon{background:linear-gradient(135deg,#9333ea,#c084fc)}
body.tmpl-crimson{--bg:#f8f4f4;--card:#ffffff;--text:#1a0808;--sub:#6b5050;--border:#e8d5d5;--inp:#fff8f8;--primary:#be123c;--primary-dark:#9f1239;--secondary:#e11d48;--indigo-light:#ffe4e6;--shadow:0 2px 12px rgba(190,18,60,.09)}
body.tmpl-crimson nav{background:#ffffff;border-bottom:1px solid #e8d5d5}
body.tmpl-crimson .logo-icon{background:linear-gradient(135deg,#9f1239,#e11d48)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;height:60px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;z-index:100;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:900}
.logo-txt{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-srch{position:relative;flex:0 0 260px}
.nav-srch input{width:100%;padding:9px 12px 9px 36px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--inp);font-size:13px;color:var(--text);box-sizing:border-box;transition:border .2s}
.nav-srch input:focus{outline:none;border-color:var(--primary)}
.nav-srch>i{position:absolute;left:10px;top:22px;transform:translateY(-50%);color:var(--sub);font-size:13px;pointer-events:none}
.srch-recent-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background .12s}
.srch-recent-item:hover{background:var(--indigo-light);color:var(--primary)}
.nav-links{display:flex;gap:4px;margin-left:auto}
.nb{display:flex;flex-direction:column;align-items:center;padding:6px 14px;border-radius:var(--r-sm);border:none;background:none;cursor:pointer;color:var(--sub);font-size:11px;gap:3px;transition:.15s;text-decoration:none;position:relative}
.nb i{font-size:20px}
.nb.active,.nb:hover{color:var(--primary)}
.nb.active::after{content:'';position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);width:60%;height:2px;background:var(--primary);border-radius:2px}
.badge{position:absolute;top:2px;right:8px;background:#ef4444;color:#fff;font-size:9px;padding:1px 5px;border-radius:10px;font-weight:700;min-width:16px;text-align:center}
/* ME DROPDOWN */
.me-wrap{position:relative;display:inline-block}
.me-menu{position:fixed;top:62px;right:12px;width:240px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:9999;overflow:hidden;animation:fadeIn .15s ease}
.me-hdr{padding:14px 16px 10px;background:var(--indigo-light);border-bottom:1px solid var(--border)}
.me-hdr h4{margin:0 0 2px;font-size:14px;font-weight:700;color:var(--text)}
.me-hdr p{margin:0;font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.me-sep{border:none;border-top:1px solid var(--border);margin:0}
.me-item{display:flex;align-items:center;gap:12px;padding:11px 16px;color:var(--text);text-decoration:none;font-size:13px;font-weight:500;transition:background .12s;cursor:pointer}
.me-item:hover{background:var(--indigo-light);color:var(--primary)}
.me-item i{width:16px;text-align:center;font-size:14px;color:var(--sub)}
.me-item:hover i{color:var(--primary)}
.me-item.danger{color:#ef4444}
.me-item.danger i{color:#ef4444}
.me-item.danger:hover{background:#fef2f2}
.nav-avatar{width:36px;height:36px;border-radius:50%;cursor:pointer;object-fit:cover;border:2px solid var(--primary)}

/* LAYOUT */
#awrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#eef2ff 0%,#f5f3ff 100%)}
body.dark #awrap{background:linear-gradient(135deg,#0f0e1a,#1a1830)}
#appw{display:none;flex-direction:column;min-height:100vh}
#pr{padding:80px 24px 40px;max-width:1080px;margin:0 auto;width:100%;box-sizing:border-box}

/* AUTH */
.abox{background:var(--card);border-radius:20px;padding:40px;width:100%;max-width:440px;box-shadow:0 8px 40px rgba(99,102,241,.18)}
.abox h2{font-size:24px;font-weight:800;margin:0 0 6px}
.asub{color:var(--sub);font-size:14px;margin:0 0 24px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fg input,.fg textarea,.fg select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--inp);color:var(--text);font-size:14px;box-sizing:border-box;transition:border .2s;font-family:inherit}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--primary)}
.atog{text-align:center;font-size:13px;color:var(--sub);margin-top:16px}
.atog a{color:var(--primary);font-weight:700;text-decoration:none}
.err{background:#fef2f2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}

/* CARDS */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin-bottom:12px;box-shadow:var(--shadow)}
.ch{font-size:15px;font-weight:800;padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.cb{padding:16px 20px}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.chip-p{background:var(--indigo-light);color:var(--primary)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r-sm);border:none;cursor:pointer;font-size:13px;font-weight:700;transition:.15s;text-decoration:none}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:var(--primary-dark)}
.btn-o{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}
.btn-danger{background:#ef4444;color:#fff;border:none}.btn-o:hover{background:var(--indigo-light)}
.btn-g{background:var(--inp);color:var(--sub);border:1.5px solid var(--border)}
.btn-sm{padding:6px 13px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* FEED */
.two-col{display:grid;grid-template-columns:280px 1fr 300px;gap:20px;align-items:start}
.two-col.no-right{grid-template-columns:280px 1fr}
@media(max-width:860px){.two-col{grid-template-columns:1fr}}
.sb-banner{height:64px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:var(--r) var(--r) 0 0;position:relative}
.sb-avwrap{position:absolute;bottom:-28px;left:20px}
.sb-body{padding:36px 20px 12px}
.sb-body h3{font-size:15px;font-weight:800;margin:0 0 4px}
.sb-body p{font-size:12px;color:var(--sub);margin:0}
.sb-stat{display:flex;justify-content:space-between;padding:8px 20px;font-size:12px;border-top:1px solid var(--border)}
.sb-stat span:last-child{font-weight:700;color:var(--primary)}

/* COMPOSER */
.comp-wrap{padding:16px 20px 8px}
.comp-top{display:flex;gap:12px;align-items:flex-start}
.comp-ta{flex:1;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--r-sm);resize:none;background:var(--inp);color:var(--text);font-size:14px;font-family:inherit;min-height:88px;transition:border .2s;line-height:1.5}
.comp-ta:focus{outline:none;border-color:var(--primary)}
.comp-acts{display:flex;align-items:center;padding:8px 20px 12px;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border);margin-top:10px}
.comp-ext{padding:0}
.cbtn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:var(--r-sm);background:none;border:1.5px solid var(--border);cursor:pointer;font-size:12px;font-weight:700;color:var(--sub);transition:.15s}
.cbtn:hover,.cbtn.on{background:var(--indigo-light);border-color:var(--primary);color:var(--primary)}
.anon-lbl{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:5px;cursor:pointer;margin-left:auto}

/* POSTS */
.post{padding:0}
.post-hdr{display:flex;align-items:center;gap:12px;padding:16px 20px 0}
.post-hdr .pinfo{flex:1;min-width:0;overflow:hidden}
.post-hdr .pinfo h4{font-size:14px;font-weight:700;margin:0 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-hdr .pinfo p{font-size:12px;color:var(--sub);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-body{padding:12px 20px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.post-img{width:100%;max-height:480px;object-fit:cover;border-radius:0}
.post-acts{display:flex;align-items:center;gap:2px;padding:6px 8px;border-top:1px solid var(--border)}
.pact{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:var(--r-sm);background:none;border:none;cursor:pointer;font-size:13px;color:var(--sub);font-weight:600;transition:.15s}
.pact:hover{background:var(--indigo-light);color:var(--primary)}
.sort-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.see-more{color:var(--primary);font-weight:600;font-size:13px;text-decoration:none}
.see-more:hover{text-decoration:underline}
.pact.saved{color:var(--primary)}
.pact.save-btn{color:var(--sub)}
.emoji-trig{background:none;border:none;cursor:pointer;color:var(--sub);font-size:18px;padding:6px 10px;border-radius:8px;transition:.12s;flex-shrink:0;display:flex;align-items:center}
.emoji-trig:hover{background:var(--indigo-light);color:var(--primary)}
.pact.liked{color:var(--primary);font-weight:700}
.anon-badge{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}

/* POLL */
.poll-opt{margin-bottom:8px}
.poll-bar-wrap{display:flex;align-items:center;gap:10px}
.poll-bar{height:8px;border-radius:4px;background:var(--primary);min-width:4px;transition:width .4s}
.poll-bg{flex:1;height:8px;border-radius:4px;background:var(--border)}
.poll-btn{width:100%;padding:9px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--inp);cursor:pointer;font-size:13px;font-weight:600;color:var(--text);text-align:left;transition:.15s}
.poll-btn:hover{border-color:var(--primary);color:var(--primary)}
.poll-btn.voted{border-color:var(--primary);background:var(--indigo-light);color:var(--primary)}

/* COMMENTS */
.coms-area{padding:12px 20px;border-top:1px solid var(--border)}
.com-row{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.com-bub{background:var(--inp);border-radius:12px;padding:10px 14px;flex:1}
.com-bub h5{font-size:12px;font-weight:700;margin:0 0 4px}
.com-bub p{font-size:13px;margin:0;line-height:1.4}
.com-inp{display:flex;gap:8px;margin-top:8px}
.com-inp input{flex:1;padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--inp);color:var(--text);font-size:13px}
.com-inp input:focus{outline:none;border-color:var(--primary)}

/* PROFILE */
.prof-banner{height:160px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:var(--r) var(--r) 0 0;position:relative}
.prof-avwrap{position:absolute;bottom:-48px;left:28px}
.prof-body{padding:60px 28px 20px}
.prof-body h1{font-size:22px;font-weight:800;margin:0 0 4px}
.prof-body .ph{font-size:14px;color:var(--sub);margin:0 0 6px}
.prof-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.exp-row{padding:14px 0;border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:flex-start}
.exp-ico{width:44px;height:44px;border-radius:10px;background:var(--indigo-light);display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:20px;flex-shrink:0}

/* PEOPLE ROWS */
.prow{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border)}
.prow:last-child{border-bottom:none}
.pinfo h4{font-size:14px;font-weight:700;margin:0 0 3px}
.pinfo p{font-size:12px;color:var(--sub);margin:0}
.pinfo{flex:1;min-width:0}

/* SUGGESTIONS GRID */
.sug-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.sug-card{text-align:center;padding:20px 16px;border-radius:var(--r);border:1px solid var(--border);background:var(--card);transition:.15s}
.sug-card:hover{box-shadow:0 4px 20px rgba(99,102,241,.12);transform:translateY(-2px)}
.sug-card h4{font-size:13px;font-weight:700;margin:0 0 4px}
.sug-card p{font-size:12px;color:var(--sub);margin:0 0 12px;line-height:1.4;min-height:32px}

/* MESSAGING */
#mlay{display:grid;grid-template-columns:320px 1fr;grid-template-rows:1fr;height:calc(100vh - 60px);background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.mlist{border-right:1px solid var(--border);display:flex;flex-direction:column}
.mhdr{padding:16px 20px;font-weight:800;font-size:16px;border-bottom:1px solid var(--border);display:flex;align-items:center}
#ml{flex:1;overflow-y:auto}
.mthread{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;border-bottom:1px solid var(--border);transition:.15s;position:relative}
.mthread:hover,.mthread.active{background:var(--indigo-light)}
.mthread .mi{flex:1;min-width:0}
.mthread .mi h5{font-size:13px;font-weight:700;margin:0 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mthread .mi p{font-size:12px;color:var(--sub);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.udot{min-width:16px;height:16px;border-radius:8px;background:#e11d48;color:#fff;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;padding:0 4px;margin-left:auto}
#ccol{display:flex;flex-direction:column;height:100%;min-height:0;align-self:stretch}
#ctop{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
#ctop h3{font-size:15px;font-weight:700;margin:0}
#ctop p{font-size:12px;color:var(--sub);margin:0}
#cmsgs{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:16px 20px;display:flex;flex-direction:column;gap:10px;box-sizing:border-box}
.bub{max-width:65%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;overflow-wrap:break-word;box-sizing:border-box}
.bub .bub-foot{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:3px}
.bub time{font-size:10px;opacity:.6}
.bub.mine{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.bub.theirs{background:var(--inp);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.tick{font-size:10px;color:rgba(255,255,255,.55)}
.tick.sent{color:rgba(255,255,255,.55)}
.tick.delivered{color:rgba(255,255,255,.85)}
.tick.read{color:#93c5fd}
/* Typing indicator */
#typind{padding:6px 20px;font-size:12px;color:var(--sub);display:none;align-items:center;gap:6px;flex-shrink:0}
.tdots{display:flex;gap:4px;align-items:center}
.tdots span{width:7px;height:7px;border-radius:50%;background:var(--sub);animation:tdot 1.2s ease-in-out infinite}
.tdots span:nth-child(2){animation-delay:.2s}
.tdots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
/* Online presence */
.pres-wrap{position:relative;display:inline-block;flex-shrink:0}
.pres-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:#22c55e;border-radius:50%;border:2px solid var(--card);display:none}
.pres-wrap.online .pres-dot{display:block}
#cinp{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0;align-items:center}
#cinp input{flex:1;padding:11px 16px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--inp);color:var(--text);font-size:14px;transition:border .15s}
#cinp input:focus{outline:none;border-color:var(--primary)}
#cinp button{width:42px;height:42px;border-radius:50%;flex-shrink:0}

/* DATETIME INPUT — fix dark mode calendar icon visibility */
input[type="datetime-local"]{color-scheme:dark}
body:not(.dark) input[type="datetime-local"]{color-scheme:light}
input[type="datetime-local"]::-webkit-calendar-picker-indicator{filter:invert(0.6);cursor:pointer;padding:2px}
body.dark input[type="datetime-local"]::-webkit-calendar-picker-indicator{filter:invert(0.8) brightness(1.5)}
/* Editable bubble */
.bub.mine:hover .edit-msg-btn{opacity:1}
.edit-msg-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:11px;padding:2px 4px;opacity:0;transition:opacity .15s;margin-left:4px}
.edit-msg-btn:hover{color:#fff;opacity:1}
@media(pointer:coarse){.edit-msg-btn{opacity:.7}}

/* AVATAR */
.av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.av40{width:40px;height:40px;font-size:16px}
.av48{width:48px;height:48px;font-size:18px}
.av56{width:56px;height:56px;font-size:20px}
.av80{width:80px;height:80px;font-size:28px}

/* UTIL */
.ld{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--sub);gap:10px;font-size:14px}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Skeleton shimmer */
.skel{background:linear-gradient(90deg,var(--border) 25%,var(--inp) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.skel-avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0}
.skel-line{height:12px;margin-bottom:8px}
.skel-line.w60{width:60%}.skel-line.w80{width:80%}.skel-line.w100{width:100%}.skel-line.w40{width:40%}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1e1b3a;color:#fff;padding:12px 22px;border-radius:var(--r-sm);font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:20px;padding:28px;width:100%;max-width:560px;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 16px 60px rgba(0,0,0,.25)}
.mclose{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--sub);line-height:1}
.empty{text-align:center;padding:48px 20px;color:var(--sub)}
.empty i{font-size:48px;opacity:.2;margin-bottom:16px}
.empty p{font-size:14px;margin:8px 0 0}

/* FORMS */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.frow2{display:flex;gap:10px}
.frow2 input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--inp);color:var(--text);font-size:13px}
.frow2 select{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--inp);color:var(--text);font-size:13px}
.frow2 input:focus,.frow2 select:focus{outline:none;border-color:var(--primary)}

/* JOBS */
.ji{padding:20px}
.jco{color:var(--sub);font-size:13px;margin:2px 0}
.jmeta{display:flex;flex-wrap:wrap;gap:12px;margin:10px 0;font-size:12px;color:var(--sub)}
.jmeta span{display:flex;align-items:center;gap:5px}
.jdesc{font-size:13px;color:var(--sub);line-height:1.5;margin:8px 0 0}
.fb{display:flex;justify-content:space-between;align-items:flex-start}

/* PAGE HEADERS */
.phdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.phdr h1{font-size:22px;font-weight:800;margin:0}

/* RATING */
.stars{color:#f59e0b;font-size:16px}

/* SEARCH HIGHLIGHT */
mark{background:var(--indigo-light);color:var(--primary);border-radius:3px;padding:0 2px}

/* ── RIGHT SIDEBAR ──────────────────────────────────────── */
#rs{position:sticky;top:76px}
.rs-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
.rs-card .rs-hdr{padding:14px 16px 10px;font-size:13px;font-weight:700;color:var(--text);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.rs-card .rs-hdr span{font-size:11px;font-weight:400;color:var(--sub)}
.rs-item{padding:10px 16px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border);cursor:pointer;transition:.12s}
.rs-item:last-child{border-bottom:none}
.rs-item:hover{background:var(--indigo-light)}
.rs-item-body p{font-size:13px;font-weight:600;margin:0 0 2px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rs-item-body span{font-size:11px;color:var(--sub)}
.tag-chip{display:inline-block;padding:4px 10px;border-radius:20px;background:var(--indigo-light);color:var(--primary);font-size:12px;font-weight:600;margin:3px 4px 3px 0;cursor:pointer;transition:.12s}
.tag-chip:hover{background:var(--primary);color:#fff}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-row:hover{background:var(--indigo-light);cursor:pointer}
.stat-row .stat-label{font-size:13px;color:var(--sub)}
.stat-row .stat-val{font-size:14px;font-weight:700;color:var(--primary)}
/* ── BOTTOM NAV (mobile) ─────────────────────────────────── */
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:auto;min-height:56px;padding-bottom:env(safe-area-inset-bottom,0px);background:var(--card);border-top:1px solid var(--border);z-index:100;justify-content:space-around;align-items:center;box-shadow:0 -2px 10px rgba(0,0,0,.06)}
.mob-si{display:flex;align-items:center;gap:12px;width:100%;padding:13px 22px;background:none;border:none;cursor:pointer;font-size:14px;font-weight:500;color:var(--text);text-align:left}
.mob-si i{width:20px;text-align:center;color:var(--primary);font-size:16px}
.mob-si:hover,.mob-si:active{background:var(--indigo-light)}
#bnav button{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;color:var(--sub);font-size:10px;font-weight:600;padding:5px 10px;border-radius:10px;position:relative;min-width:50px;transition:.12s}
#bnav button.active,#bnav button:hover{color:var(--primary)}
#bnav button i{font-size:21px}
#bnav button span.bnlbl{font-size:10px;line-height:1}
.bn-badge{position:absolute;top:1px;right:4px;background:#ef4444;color:#fff;font-size:9px;padding:1px 5px;border-radius:10px;font-weight:700;min-width:14px;text-align:center;display:none}
/* Back arrow in chat (mobile only) */
.back-to-threads{display:none;background:none;border:none;cursor:pointer;color:var(--primary);font-size:15px;padding:5px 8px;border-radius:6px;flex-shrink:0;align-items:center;gap:5px;font-weight:700}
@media(max-width:640px){.back-to-threads{display:flex}}

/* ── TABLET (641–860px) ──────────────────────────────────── */
@media(max-width:860px){
  /* Nav: icon-only, hide text labels */
  .nb{font-size:0;padding:6px 9px}
  .nb i{font-size:20px}
  .nb.active::after{bottom:-8px}
  /* Hide less-used nav items on tablet */
  #nb-salary,#nb-reviews{display:none}
  .nav-srch{flex:0 0 200px}
  #pr{padding:76px 16px 40px}
}

/* ── MOBILE (≤640px) ─────────────────────────────────────── */
@media(max-width:640px){
  /* ── GLOBAL ── */
  /* Only overflow-x:hidden on html — NOT body (body overflow:hidden clips fixed elements on iOS Safari) */
  html{overflow-x:hidden}
  body{width:100%;max-width:100vw;position:relative}
  /* Prevent browser auto-zoom on input focus (triggers when font-size < 16px) */
  input,textarea,select{font-size:16px !important}
  /* All block containers box-sizing safe */
  .card,.modal,section,article,.page{box-sizing:border-box;width:100%}
  /* ── NAV ── */
  nav{padding:0 12px;height:56px}
  .logo-txt{display:none}
  .logo-icon{width:32px;height:32px;font-size:15px}
  .nav-srch{flex:1;min-width:0;margin:0 8px}
  .nav-srch input{padding:8px 10px 8px 32px}
  .nav-links{display:none}
  /* ── BOTTOM NAV ── */
  #bnav{display:flex}
  /* ── CONTENT OFFSET ── */
  #pr{padding:64px 10px 96px;overflow-x:hidden;width:100%;box-sizing:border-box}
  /* ── MESSAGING LAYOUT ── */
  #mlay{grid-template-columns:1fr;height:calc(100dvh - 112px)}
  .mlist{height:100%;display:flex;flex-direction:column;overflow-y:auto}
  /* Chat panel: fixed, sits between top nav and bottom nav */
  #ccol{position:fixed;top:56px;left:0;right:0;height:calc(100dvh - 56px - env(safe-area-inset-bottom,0px));background:var(--card);z-index:50;display:none;flex-direction:column;overflow:hidden}
  #mlay.chat-open #ccol{display:flex}
  #mlay.chat-open .mlist{display:none}
  /* Keep bottom nav visible in chat for navigation */
  body.in-chat #bnav{display:none}
  /* ── CHAT INTERNALS ── */
  #ctop{display:flex;align-items:center;gap:8px;padding:8px 12px;flex-shrink:0;border-bottom:1px solid var(--border);flex-wrap:nowrap;min-height:52px}
  #ctop h3{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1}
  #ctop p{font-size:11px;display:none}
  #cinp{padding:8px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom,8px));gap:6px;flex-shrink:0;border-top:1px solid var(--border);background:var(--card)}
  #cinp input{font-size:16px !important;padding:9px 12px}
  #cmsgs{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:10px 12px;box-sizing:border-box;width:100%}
  .bub{max-width:78%;word-break:break-word;overflow-wrap:break-word;box-sizing:border-box}
  /* ── BACK BUTTON ── */
  .back-to-threads{display:flex;align-items:center;gap:6px;background:var(--indigo-light);color:var(--primary);border:none;cursor:pointer;padding:7px 12px;border-radius:20px;font-size:13px;font-weight:700;flex-shrink:0}
  /* ── MODALS → BOTTOM SHEET ── */
  .modal-bg{align-items:flex-end;padding:0}
  .modal{border-radius:20px 20px 0 0;max-height:90dvh;width:100%;max-width:100%;box-sizing:border-box;padding:22px 20px;overflow-y:auto;overflow-x:hidden}
  /* ── LAYOUT ── */
  .two-col{grid-template-columns:1fr;gap:0}
  #sl{display:none}
  #rs{display:none}
  .card{border-radius:10px;overflow:hidden;box-sizing:border-box;width:100%}
  .sug-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  /* ── PEOPLE / NETWORK ROWS ── */
  .prow{flex-wrap:wrap;gap:8px;box-sizing:border-box;width:100%;overflow:hidden}
  .prow .pinfo{min-width:0;flex:1 1 60%}
  .prow .pacts{display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0}
  /* ── MENTOR STAT BAR ── */
  .slot-stats-bar{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap !important}
  /* ── NOTIFICATION ITEMS ── */
  .notif-item{overflow:hidden;box-sizing:border-box}
  .notif-item .pinfo{min-width:0;overflow:hidden}
  .notif-item .pinfo p{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* ── JOB TAGS ── */
  .jmeta{flex-wrap:wrap;gap:8px}
  /* ── FEED ── */
  .post-hdr{padding:12px 14px 0}
  .post-body{padding:10px 14px;font-size:13px;word-break:break-word}
  .post-acts{padding:4px 6px;gap:0}
  .pact{padding:7px 10px;font-size:12px;gap:4px}
  .react-counts{padding:2px 14px 4px}
  /* ── COMPOSER ── */
  .comp-wrap{padding:12px 14px 6px}
  .comp-ta{min-height:72px;font-size:16px !important}
  /* Icon-only buttons on mobile — hide the text labels, keep icons + Anonymous label */
  .cbtn-lbl{display:none}
  .comp-acts{padding:6px 12px 10px;gap:6px;flex-wrap:nowrap;align-items:center;overflow:visible}
  .cbtn{padding:8px 10px;font-size:15px;gap:0;min-width:0;flex-shrink:0}
  .anon-lbl{font-size:12px;flex-shrink:0;white-space:nowrap}
  /* ── THREADS LIST ── */
  .mhdr{padding:12px 16px;font-size:14px}
  .mthread{padding:12px 14px}
  /* ── PROFILE ── */
  .prof-body{padding:52px 16px 14px}
  .prof-body h1{font-size:18px}
  .prof-actions{gap:8px;flex-wrap:wrap}
  /* ── FORMS ── */
  .frow{grid-template-columns:1fr}
  .frow2{flex-direction:column}
  /* ── PAGE HEADERS ── */
  .phdr h1{font-size:18px}
  .phdr{margin-bottom:12px}
  /* ── JOBS ── */
  .ji{padding:14px;overflow:hidden}
  /* ── EXPERTS GRID ── */
  .sug-grid .card{padding:14px}
  /* ── ME BOTTOM SHEET ── */
  /* Always full-width via position:fixed left:0 right:0 — ensure content doesn't overflow */
  #mob-sheet{overflow-x:hidden;box-sizing:border-box;max-width:100vw}
  #mob-sheet *{box-sizing:border-box}
  /* Profile header row: first child (avatar) stays fixed-size, second child (text) fills rest */
  #mob-sheet-profile{overflow:hidden}
  #mob-sheet-profile > *:first-child{flex-shrink:0 !important;width:48px !important;height:48px !important;border-radius:50% !important;flex:none !important}
  #mob-sheet-profile > div:last-child{min-width:0;overflow:hidden;flex:1}
  #mob-sheet-profile p{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0}
  /* ── SALARY / REVIEW / EXPERT CARDS ── */
  .rev-card,.sal-card,.expert-card{overflow:hidden;box-sizing:border-box;width:100%}
}
/* Very small phones */
@media(max-width:380px){
  .sug-grid{grid-template-columns:1fr}
  #bnav button .bnlbl{display:none}
  #bnav button{min-width:44px}
  .pact{padding:6px 8px;font-size:11px}
}

/* REACTIONS */
.react-wrap{position:relative;display:inline-block}
.react-btn{-webkit-touch-callout:none;user-select:none}
.react-pop{position:fixed;background:var(--card);border:1px solid var(--border);border-radius:32px;padding:8px 12px;box-shadow:0 6px 28px rgba(0,0,0,.18);z-index:500;display:flex;gap:4px;animation:fadeIn .12s ease}
.react-pop button{background:none;border:none;cursor:pointer;font-size:26px;padding:5px 7px;border-radius:50%;transition:transform .12s,background .12s;display:flex;flex-direction:column;align-items:center;line-height:1}
.react-pop button:hover{transform:scale(1.35)}
.react-pop button span{font-size:9px;color:var(--sub);margin-top:2px;white-space:nowrap;display:block}
.react-counts{padding:4px 20px 6px;min-height:22px}
.rx-bar{display:flex;align-items:center;gap:1px}
.rx-em{font-size:15px;line-height:1;margin-right:1px}
.rx-tot{font-size:12px;color:var(--sub);font-weight:500;margin-left:5px}
/* EMOJI PICKER */
.emoji-pop{position:fixed;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:8px;box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:9998;display:grid;grid-template-columns:repeat(6,1fr);gap:2px;min-width:210px}
.emoji-pop button{background:none;border:none;cursor:pointer;font-size:22px;padding:5px;border-radius:6px;transition:background .1s;line-height:1}
.emoji-pop button:hover{background:var(--indigo-light)}
/* FLAG BUTTON */
.flag-btn{background:none;border:none;cursor:pointer;color:var(--sub);font-size:12px;padding:5px 8px;border-radius:6px;transition:.12s;opacity:0;flex-shrink:0}
.post-hdr:hover .flag-btn{opacity:1}
.flag-btn:hover{color:#ef4444;background:#fef2f2}
/* ACCOUNT WARNING TOAST */
.acct-warn{position:fixed;top:70px;right:16px;background:#fffbeb;border:1.5px solid #f59e0b;border-radius:var(--r);padding:14px 18px;max-width:340px;z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,.15);animation:fadeIn .2s ease}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12);box-shadow:0 0 0 4px rgba(99,102,241,.3)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<!-- Apply dark mode immediately to prevent flash of unstyled content -->
<script>(function(){var s=localStorage.getItem('nxdark'),sys=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;if(s==='1'||(s===null&&sys))document.body.classList.add('dark');})()</script>

<!-- PAGE LOAD SPLASH -->
<div id="nxload" style="position:fixed;inset:0;z-index:99999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .35s">
  <div style="text-align:center">
    <div style="width:52px;height:52px;border-radius:14px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;font-weight:900;margin:0 auto 14px;box-shadow:0 4px 20px rgba(99,102,241,.4)">N</div>
    <p style="color:var(--sub);font-size:13px;margin:0">Loading Nexus…</p>
  </div>
</div>

<!-- AUTH WRAPPER -->
<div id="awrap" style="display:none">
  <div class="abox">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px">
      <div class="logo-icon">N</div>
      <span style="font-size:22px;font-weight:900;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Nexus</span>
    </div>
    <div id="aform"></div>
  </div>
</div>

<!-- APP WRAPPER -->
<div id="appw">
  <nav>
    <a class="logo" href="#" onclick="go('home')">
      <div class="logo-icon">N</div>
      <span class="logo-txt">Nexus</span>
    </a>
    <div class="nav-srch" style="position:relative">
      <i class="fas fa-search"></i>
      <input type="text" id="gsrch" placeholder="Search people, posts…" autocomplete="off"
        oninput="handleSearch(this.value)"
        onfocus="showRecentSearches()"
        onkeydown="if(event.key==='Escape'){this.value='';hideSearchDrop();go('home')}else if(event.key==='Enter'&&this.value.trim()){addRecentSearch(this.value.trim());hideSearchDrop()}">
      <div id="srch-drop" style="display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:9999;overflow:hidden"></div>
    </div>
    <div class="nav-links">
      <button class="nb active" id="nb-home" onclick="go('home')"><i class="fas fa-house"></i>Home</button>
      <button class="nb" id="nb-network" onclick="go('network')"><i class="fas fa-users"></i>Network<span id="connbadge" class="badge" style="display:none">0</span></button>
      <button class="nb" id="nb-jobs" onclick="go('jobs')"><i class="fas fa-briefcase"></i>Jobs</button>
      <button class="nb" id="nb-messaging" onclick="go('messaging')"><i class="fas fa-comment-dots"></i>Chat<span id="mbadge" class="badge" style="display:none">0</span></button>
      <button class="nb" id="nb-notifications" onclick="go('notifications')"><i class="fas fa-bell"></i>Alerts<span id="nbadge" class="badge" style="display:none">0</span></button>
      <button class="nb" id="nb-salary" onclick="go('salary')"><i class="fas fa-indian-rupee-sign"></i>Salaries</button>
      <button class="nb" id="nb-reviews" onclick="go('reviews')"><i class="fas fa-star"></i>Reviews</button>
      <button class="nb" id="nb-experts" onclick="go('experts')"><i class="fas fa-chalkboard-teacher"></i>Mentors</button>

          <span id="me-av-sm"></span>Me<i class="fas fa-caret-down" style="font-size:10px;margin-left:2px"></i>
        </button>
        <div class="me-menu" id="me-menu" style="display:none">
          <div class="me-hdr" id="me-menu-hdr">
            <h4>Loading…</h4><p>&nbsp;</p>
          </div>
          <a href="#" class="me-item" onclick="closeMe();go('profile')"><i class="fas fa-user"></i>View Profile</a>
          <a href="#" class="me-item" onclick="closeMe();go('network')"><i class="fas fa-users"></i>My Network</a>
          <a href="#" class="me-item" onclick="closeMe();go('notifications')"><i class="fas fa-bell"></i>Notifications</a>
          <hr class="me-sep">
          <a href="#" class="me-item" onclick="closeMe();toggleDark()"><i class="fas fa-moon"></i>Toggle Dark Mode</a>
          <div style="padding:8px 14px">
            <button onclick="showTemplatePicker()" style="width:100%;background:var(--indigo-light);border:1.5px solid var(--primary);color:var(--primary);border-radius:var(--r-sm);padding:8px 12px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;justify-content:center">
              <i class="fas fa-palette"></i> Choose Theme
            </button>

  </nav>
  <div id="pr"><div class="ld"><i class="fas fa-circle-notch spin"></i> Loading…</div></div>
</div>

<div id="toast-el" class="toast"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let token = localStorage.getItem('nxtoken') || '';

// ── SOUND ENGINE — pleasant bell/chime via Web Audio API ────────────────
const _ac = typeof AudioContext !== 'undefined' ? new AudioContext() : (typeof webkitAudioContext !== 'undefined' ? new webkitAudioContext() : null);
function _bell(freq, vol, t0) {
  if (!_ac) return;
  try {
    const o = _ac.createOscillator(), g = _ac.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 0.01);   // fast attack
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 1.2); // slow bell decay
    o.connect(g); g.connect(_ac.destination);
    o.start(t0); o.stop(t0 + 1.3);
  } catch(e) {}
}
// Message sound — soft two-note chime (C5 then E5)
function playMsgSound() {
  if (!_ac) return;
  if (_ac.state === 'suspended') _ac.resume();
  const t = _ac.currentTime;
  _bell(523, 0.18, t);        // C5
  _bell(659, 0.14, t + 0.18); // E5
}
// Notification sound — gentle three-note chime (E5, G5, C6)
function playNotifSound() {
  if (!_ac) return;
  if (_ac.state === 'suspended') _ac.resume();
  const t = _ac.currentTime;
  _bell(659, 0.15, t);        // E5
  _bell(784, 0.12, t + 0.16); // G5
  _bell(1047, 0.10, t + 0.32);// C6
}
// Unlock AudioContext on first interaction
['click','touchend','keydown'].forEach(ev =>
  document.addEventListener(ev, () => { if (_ac?.state === 'suspended') _ac.resume(); }, { once: true, passive: true })
);
let me = null, socket = null, postsData = [], curPage = 'home';

// ── POST VIEW TRACKING — simple scroll-based batch ───────────────────────
const _seenPosts = new Set(); // post IDs sent this session
let _viewTimer = null;

function _sendVisiblePostViews() {
  const pids = [...document.querySelectorAll('.post-card[data-pid]')]
    .filter(el => {
      if (_seenPosts.has(parseInt(el.dataset.pid))) return false;
      const r = el.getBoundingClientRect();
      return r.top < window.innerHeight - 50 && r.bottom > 50;
    })
    .map(el => parseInt(el.dataset.pid))
    .filter(Boolean);
  if (!pids.length) return;
  pids.forEach(p => _seenPosts.add(p));
  fetch('/api/posts/viewed', {
    method:'POST',
    headers:{'Content-Type':'application/json', Authorization:'Bearer '+token},
    body: JSON.stringify({ post_ids: pids })
  }).catch(() => {});
}

function observePosts() {
  // Send views for posts visible right now
  setTimeout(_sendVisiblePostViews, 800);
  // Also send on scroll (debounced)
  const feed = document.getElementById('feed');
  if (feed && !feed._viewBound) {
    feed._viewBound = true;
    window.addEventListener('scroll', () => {
      clearTimeout(_viewTimer);
      _viewTimer = setTimeout(_sendVisiblePostViews, 600);
    }, { passive: true });
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────
const _apiCache = new Map();
// Paths cached aggressively (2 min) — suggestions, jobs, user profile only
// analytics/me and trending use normal 30s cache so they stay fresh
const _LONG_CACHE = ['/api/connections/suggestions', '/api/jobs', '/api/users/me'];
const _SHORT_CACHE = 30000; // 30s for everything else GET
const _LONG_TTL   = 120000; // 2min for slow/stable endpoints
function _apiTTL(path) {
  return _LONG_CACHE.some(p => path.startsWith(p)) ? _LONG_TTL : _SHORT_CACHE;
}
async function api(path, opts = {}) {
  const isGet = !opts.method || opts.method === 'GET';
  if (isGet) {
    const ttl = _apiTTL(path);
    const hit = _apiCache.get(path);
    if (hit && Date.now() - hit.ts < ttl) return hit.data;
  }
  opts.headers = { ...(opts.headers || {}), 'Content-Type': 'application/json', Authorization: 'Bearer ' + token };
  const r = await fetch(path, opts);
  const data = await r.json().catch(() => ({}));
  if (isGet && r.ok) _apiCache.set(path, { data, ts: Date.now() });
  return data;
}
function apiInvalidate(prefix) {
  if (!prefix) { _apiCache.clear(); return; }
  for (const k of _apiCache.keys()) { if (k.startsWith(prefix)) _apiCache.delete(k); }
}
function av(u, cls = 'av40', onclick = '') {
  const n = (u?.name || u?.author_name || 'U');
  const l = n[0].toUpperCase();
  const s = u?.avatar_url || u?.author_avatar;
  const img = s
    ? `<img src="${s}" class="av ${cls}" style="object-fit:cover;border-radius:50%" onerror="this.outerHTML='<div class=&quot;av ${cls}&quot; ${onclick?'onclick=&quot;'+onclick+'&quot;':''} style=&quot;${onclick?'cursor:pointer':''}&quot;>${l}</div>'">`
    : `<div class="av ${cls}" ${onclick ? `onclick="${onclick}" style="cursor:pointer"` : ''}>${l}</div>`;
  return onclick ? `<span onclick="${onclick}" style="cursor:pointer;display:inline-flex;flex-shrink:0">${img}</span>` : img;
}
function timeAgo(d) {
  if (!d) return '';
  // SQLite CURRENT_TIMESTAMP returns UTC without 'Z' — force UTC parsing
  const utc = (typeof d === 'string' && !d.includes('T') && !d.endsWith('Z')) ? d + 'Z' : d;
  const s = Math.floor((Date.now() - new Date(utc)) / 1000);
  if (s < 5) return 'just now';
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  if (s < 86400 * 7) return Math.floor(s / 86400) + 'd ago';
  const dt = new Date(utc);
  return dt.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
}
function toast(msg, dur = 3000) {
  const el = document.getElementById('toast-el');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}
function showModal(html) {
  const bg = document.createElement('div'); bg.className = 'modal-bg'; bg.id = 'mbg';
  bg.innerHTML = `<div class="modal"><button class="mclose" onclick="closeModal()">&#10005;</button>${html}</div>`;
  bg.addEventListener('click', e => { if (e.target === bg) closeModal(); });
  document.body.appendChild(bg);
}
function closeModal() { document.getElementById('mbg')?.remove(); }
function showConfirm(msg, onYes, yesLabel='Delete', yesCls='btn-danger', subtitle='This action cannot be undone.') {
  // Store callback by reference — never serialize functions into HTML attributes
  window._confirmCb = onYes;
  const bg = document.createElement('div'); bg.className = 'modal-bg'; bg.id = 'mbg';
  bg.innerHTML = `<div class="modal" style="max-width:360px;text-align:center">
    <p style="font-size:15px;font-weight:600;margin:0 0 8px;color:var(--text)">${msg}</p>
    ${subtitle ? `<p style="font-size:13px;color:var(--sub);margin:0 0 24px">${subtitle}</p>` : '<div style="margin-bottom:24px"></div>'}
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-o" onclick="closeModal()" style="min-width:90px">Cancel</button>
      <button class="btn ${yesCls}" id="_confirm_yes" style="min-width:90px">${yesLabel}</button>
    </div></div>`;
  bg.addEventListener('click', e => { if (e.target === bg) closeModal(); });
  document.body.appendChild(bg);
  document.getElementById('_confirm_yes').addEventListener('click', () => {
    closeModal();
    if (window._confirmCb) { const cb = window._confirmCb; window._confirmCb = null; cb(); }
  });
}
function updBadge(id, n) {
  const label = n > 99 ? '99+' : n;
  // Top nav badge
  const el = document.getElementById(id);
  if (el) { el.style.display = n > 0 ? 'block' : 'none'; el.textContent = label; }
  // Bottom nav badge mirror
  const bel = document.getElementById('bn-' + id);
  if (bel) { bel.style.display = n > 0 ? 'block' : 'none'; bel.textContent = label; }
}

// ── NAV ───────────────────────────────────────────────────────────────────
const PAGE_TITLES = { home:'Home', network:'Network', messaging:'Messages', notifications:'Alerts', profile:'Profile', jobs:'Jobs', salary:'Salary Board', reviews:'Company Reviews', experts:'Mentors', saved:'Saved Posts' };
function go(page, extra) {
  curPage = page;
  document.title = (PAGE_TITLES[page] || 'Nexus') + ' — Nexus';
  const si = document.getElementById('gsrch'); if (si) si.value = '';
  // Top nav active
  document.querySelectorAll('.nb[id^=nb-]').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nb-' + page); if (nb) nb.classList.add('active');
  // Bottom nav active
  document.querySelectorAll('#bnav button').forEach(b => b.classList.remove('active'));
  const bnb = document.getElementById('bnb-' + page); if (bnb) bnb.classList.add('active');
  // Clear mobile chat state
  document.body.classList.remove('in-chat');
  const _pr = document.getElementById('pr'); _pr.removeAttribute('style'); _pr.innerHTML = '<div class="ld"><i class="fas fa-circle-notch spin"></i> Loading…</div>';
  ({ home: renderHome, profile: renderProfile, network: renderNetwork, messaging: renderMessaging, notifications: renderNotifs, salary: renderSalary, reviews: renderReviews, experts: renderExperts, jobs: renderJobs, saved: renderSaved }[page] || renderHome)(extra);
}
function toggleDark() {
  const activeTemplate = localStorage.getItem('nx-template') || '';
  if (activeTemplate) { toast('Switch to Default theme to toggle dark mode'); return; }
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  localStorage.setItem('nxdark', isDark ? '1' : '0');
  api('/api/users/me', { method: 'PUT', body: JSON.stringify({ is_dark_mode: isDark ? 1 : 0 }) });
}
const _templates = ['tmpl-executive','tmpl-slate','tmpl-parchment','tmpl-arctic','tmpl-carbon','tmpl-graphite','tmpl-crimson'];
const _TMPL_META = {
  '':              { label:'Default',   desc:'Indigo & white — classic professional', nav:'#ffffff', card:'#f3f4f8', accent:'#6366f1', text:'#1e1b3a' },
  'tmpl-executive':{ label:'Executive', desc:'Navy & gold — premium finance',          nav:'#0d1425', card:'#070c18', accent:'#c9a227', text:'#e8ecf8' },
  'tmpl-slate':    { label:'Slate',     desc:'Dark blue-gray — enterprise corporate',  nav:'#1a2238', card:'#141b2d', accent:'#4f8ef7', text:'#dde4f8' },
  'tmpl-parchment':{ label:'Parchment', desc:'Warm cream & amber — editorial style',   nav:'#faf6ee', card:'#f2ece0', accent:'#92400e', text:'#2a1f0e' },
  'tmpl-arctic':   { label:'Arctic',    desc:'Crisp white & teal — minimal corporate', nav:'#ffffff', card:'#edf2f7', accent:'#0d9488', text:'#1a2535' },
  'tmpl-carbon':   { label:'Carbon',    desc:'Near-black & emerald — developer dark',  nav:'#0d0d0d', card:'#0a0a0a', accent:'#22c55e', text:'#f0f0f0' },
  'tmpl-graphite': { label:'Graphite',  desc:'Charcoal & violet — creative agency',    nav:'#1a1c28', card:'#16181f', accent:'#a855f7', text:'#dce0f0' },
  'tmpl-crimson':  { label:'Crimson',   desc:'Clean white & deep red — bold consulting', nav:'#ffffff', card:'#f8f4f4', accent:'#be123c', text:'#1a0808' },
};
const _darkTemplates = new Set(['tmpl-executive','tmpl-slate','tmpl-carbon','tmpl-graphite']);
function setTemplate(t) {
  document.body.classList.remove(..._templates);
  if (t) document.body.classList.add(t);
  localStorage.setItem('nx-template', t || '');
  if (_darkTemplates.has(t)) document.body.classList.add('dark');
  else if (t) document.body.classList.remove('dark');
  closeModal(); closeMe();
  toast(((_TMPL_META[t||'']||{}).label || 'Default') + ' theme applied');
}
// Legacy setTheme — maps to setTemplate for backward compat
function setTheme(t) { setTemplate(''); }
function showTemplatePicker() {
  closeMe(); if (typeof closeMobileSheet === 'function') closeMobileSheet();
  const cur = localStorage.getItem('nx-template') || '';
  const order = ['','tmpl-arctic','tmpl-parchment','tmpl-crimson','tmpl-executive','tmpl-slate','tmpl-carbon','tmpl-graphite'];
  const cards = order.map(key => {
    const m = _TMPL_META[key]; const active = key === cur;
    const ring = active ? `box-shadow:0 0 0 3px ${m.accent};border-color:${m.accent}` : `border-color:${m.accent}30`;
    return `<div onclick="setTemplate('${key}')" style="cursor:pointer;border-radius:12px;overflow:hidden;border:2px solid;${ring};transition:all .18s;width:150px;flex-shrink:0">
      <div style="height:20px;background:${m.nav};border-bottom:1px solid ${m.accent}28;display:flex;align-items:center;gap:5px;padding:0 8px">
        <div style="width:10px;height:10px;border-radius:4px;background:${m.accent}"></div>
        <div style="height:3px;background:${m.accent}40;border-radius:2px;flex:1"></div>
        <div style="width:13px;height:13px;border-radius:50%;background:${m.accent}55"></div>
      </div>
      <div style="background:${m.card};padding:8px">
        <div style="height:4px;background:${m.text}18;border-radius:3px;margin-bottom:4px;width:88%"></div>
        <div style="height:3px;background:${m.text}12;border-radius:3px;margin-bottom:7px;width:60%"></div>
        <div style="background:${m.nav};border:1px solid ${m.accent}22;border-radius:6px;padding:6px;margin-bottom:6px">
          <div style="height:3px;background:${m.text}18;border-radius:2px;margin-bottom:3px;width:85%"></div>
          <div style="height:3px;background:${m.text}12;border-radius:2px;width:55%"></div>
        </div>
        <div style="background:${m.accent};border-radius:5px;height:16px;width:65%"></div>
      </div>
      <div style="background:${m.card};padding:2px 8px 8px;border-top:1px solid ${m.accent}18">
        <span style="font-size:12px;font-weight:700;color:${m.text}">${m.label}${active?' ✓':''}</span><br>
        <span style="font-size:10px;color:${m.text};opacity:.5;line-height:1.3">${m.desc}</span>
      </div>
    </div>`;
  }).join('');
  showModal(`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
    <h2 style="margin:0">Choose Theme</h2>
    <span style="font-size:12px;color:var(--sub)">Applies instantly</span>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap">${cards}</div>`);
  const modal = document.querySelector('#mbg .modal');
  if (modal) { modal.style.maxWidth = '740px'; modal.style.width = '95vw'; }
}
// Boot: restore saved template
(function() {
  const saved = localStorage.getItem('nx-template');
  if (saved && ['tmpl-executive','tmpl-slate','tmpl-parchment','tmpl-arctic','tmpl-carbon','tmpl-graphite','tmpl-crimson'].includes(saved)) {
    document.body.classList.add(saved);
    if (['tmpl-executive','tmpl-slate','tmpl-carbon','tmpl-graphite'].includes(saved)) document.body.classList.add('dark');
  }
})();
function toggleMeMenu() {
  const menu = document.getElementById('me-menu');
  if (!menu) return;
  const open = menu.style.display !== 'none';
  menu.style.display = open ? 'none' : 'block';
  if (!open && me) {
    const hdr = document.getElementById('me-menu-hdr');
    if (hdr) hdr.innerHTML = `<h4>${me.name}</h4><p>${me.headline || me.email || ''}</p>`;
    const avEl = document.getElementById('me-av-sm');
    if (avEl) avEl.outerHTML = me.avatar_url
      ? `<img src="${me.avatar_url}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;margin-right:4px" id="me-av-sm">`
      : `<span id="me-av-sm" style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:700;margin-right:4px">${me.name[0]}</span>`;
  }
}
function closeMe() { const m = document.getElementById('me-menu'); if (m) m.style.display = 'none'; }
document.addEventListener('click', e => {
  if (!document.getElementById('me-wrap')?.contains(e.target)) closeMe();
  if (!e.target.closest('.nav-srch')) hideSearchDrop();
  if (_rxPop && !e.target.closest('.react-pop') && !e.target.closest('.react-btn')) { _rxPop.remove(); _rxPop = null; }
});
function updateMobDarkBtn() {
  const isDark = document.body.classList.contains('dark');
  const lbl = document.getElementById('mob-dark-lbl'); if (lbl) lbl.textContent = isDark ? 'Light Mode' : 'Dark Mode';
  const icon = document.querySelector('#mob-dark-btn i'); if (icon) { icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon'; }
}
function openMobileSheet() {
  const bg = document.getElementById('mob-sheet-bg'), sh = document.getElementById('mob-sheet'); if (!bg||!sh) return;
  bg.style.display = 'block'; sh.style.display = 'block';
  requestAnimationFrame(() => sh.style.transform = 'translateY(0)');
  updateMobDarkBtn();
  if (me) {
    const nameEl = document.getElementById('mob-sheet-name'); if (nameEl) nameEl.textContent = me.name || '';
    const hlEl = document.getElementById('mob-sheet-hl'); if (hlEl) hlEl.textContent = me.headline || me.email || '';
    const avEl = document.getElementById('mob-sheet-av');
    if (avEl) avEl.outerHTML = me.avatar_url
      ? `<img id="mob-sheet-av" src="${me.avatar_url}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0">`
      : `<div id="mob-sheet-av" style="width:48px;height:48px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0">${(me.name||'?')[0]}</div>`;
  }
}
function closeMobileSheet() {
  const bg = document.getElementById('mob-sheet-bg'), sh = document.getElementById('mob-sheet'); if (!bg||!sh) return;
  sh.style.transform = 'translateY(100%)';
  setTimeout(() => { bg.style.display = 'none'; sh.style.display = 'none'; }, 300);
}
function logout() {
  showConfirm('Sign out of Nexus?', () => {
    localStorage.removeItem('nxtoken');
    localStorage.removeItem('nxdark');
    token = ''; me = null;
    if (socket) { socket.disconnect(); socket = null; }
    clearInterval(window._badgeTimer); clearInterval(window._chatPollTimer);
    document.body.classList.remove('dark');
    document.getElementById('appw').style.display = 'none';
    showAuth('login');
    toast('Signed out. See you soon!');
  }, 'Sign out', 'btn-danger', '');
}
function initSocket() {
  if (typeof io === 'undefined') return;
  if (socket) { try { socket.removeAllListeners(); socket.disconnect(); } catch(e){} socket = null; }
  socket = io({ reconnection: true, reconnectionAttempts: Infinity, reconnectionDelay: 1000, reconnectionDelayMax: 8000, timeout: 10000 });

  socket.on('connect', () => {
    socket.emit('authenticate', token);
    // On reconnect re-fetch presence so indicators update immediately
    if (achat) setTimeout(() => socket.emit('get_presence', { userId: achat }), 500);
  });
  socket.on('reconnect', () => {
    socket.emit('authenticate', token);
    if (achat) setTimeout(() => socket.emit('get_presence', { userId: achat }), 500);
  });
  socket.emit('authenticate', token);

  // ── SINGLE persistent message handler ────────────────────────────────────
  socket.on('message', m => {
    if (!m || m.sender_id == me?.id) return; // ignore echoes of own messages
    const mb = document.getElementById('cmsgs');
    if (curPage === 'messaging' && achat == m.sender_id && mb) {
      // Chat with this person is open — append immediately
      if (!mb.querySelector('[data-mid="' + m.id + '"]')) {
        const div = document.createElement('div');
        div.className = 'bub theirs'; div.setAttribute('data-mid', m.id);
        div.innerHTML = `${escHtml(m.content)}<div class="bub-foot"><time>${timeAgo(m.created_at||new Date().toISOString())}</time></div>`;
        mb.appendChild(div); mb.scrollTop = mb.scrollHeight;
        playMsgSound();
        socket.emit('mark_read', { from: m.sender_id });
        setTimeout(refreshThreads, 300);
      }
    } else {
      // Not on this specific chat
      if (curPage !== 'messaging') {
        // User is on a different page entirely — show badge + toast
        // Increment badge by fetching live count (avoids always-1 bug)
        fetch('/api/notifications/badges', { headers: { Authorization: 'Bearer ' + token } })
          .then(r => r.json()).then(b => { if (b && !b.error) updBadge('mbadge', b.unread_messages || 0); }).catch(() => {});
        playMsgSound();
        if (m.sender_name) toast(`💬 ${m.sender_name}: ${(m.content||'').substring(0,60)}`);
      } else {
        // On messaging page but different chat — update thread list and badge
        refreshThreads();
        fetch('/api/notifications/badges', { headers: { Authorization: 'Bearer ' + token } })
          .then(r => r.json()).then(b => { if (b && !b.error) updBadge('mbadge', b.unread_messages || 0); }).catch(() => {});
      }
    }
  });

  // Read receipts — my sent messages turn blue tick when receiver reads
  // Real-time connection status update
  socket.on('connection_update', ({ type, with: uid }) => {
    apiInvalidate('/api/users/' + uid);
    apiInvalidate('/api/connections');
    // If currently viewing that profile page, re-render the connect button
    if (curPage === 'profile') renderProfile(uid);
    // Update connection count in sidebar
    api('/api/users/me', {}, true).then(u => {
      if (u && !u.error) {
        me = { ...me, connections_count: u.connections_count };
        const el = document.getElementById('sb-conns');
        if (el) el.textContent = u.connections_count;
      }
    });
    if (type === 'accepted') playNotifSound();
  });
  // Sync badge across all devices when any device marks messages as read
  socket.on('badge_sync', ({ unread_messages }) => {
    updBadge('mbadge', unread_messages || 0);
    // Also refresh thread list so dots disappear
    if (curPage === 'messaging') refreshThreads();
  });
  socket.on('read_receipt', ({ by }) => {
    if (achat == by) document.querySelectorAll('#cmsgs .bub.mine .tick').forEach(t => { t.className = 'tick read'; t.innerHTML = '<i class="fas fa-check-double"></i>'; });
  });

  // Typing
  socket.on('typing', ({ from }) => {
    if (from != achat) return;
    const ti = document.getElementById('typind');
    if (ti) { ti.style.display = 'flex'; clearTimeout(window._tt); window._tt = setTimeout(() => { if (ti) ti.style.display = 'none'; }, 3000); }
  });
  socket.on('stop_typing', ({ from }) => {
    if (from != achat) return;
    clearTimeout(window._tt); const ti = document.getElementById('typind'); if (ti) ti.style.display = 'none';
  });

  // Presence
  socket.on('online_users', ids => {
    window._online = new Set(ids.map(String));
    updatePresence(achat);
  });
  socket.on('user_online', ({ userId }) => {
    window._online = window._online || new Set(); window._online.add(String(userId)); updatePresence(userId);
  });
  socket.on('user_offline', ({ userId }) => {
    window._online = window._online || new Set(); window._online.delete(String(userId)); updatePresence(userId);
  });

  socket.on('notification', data => {
    playNotifSound();
    pollBadges();
    if (data?.content) {
      const icons = { connection_request:'👤', connection_accepted:'🎉', like:'❤️', comment:'💬', session_booked:'📅', session_confirmed:'✅', session_declined:'❌', session_cancelled:'🚫', session_rescheduled:'🔄' };
      toast(`${icons[data.type]||'🔔'} ${data.content}`);
    }
    if (data?.type === 'connection_request' && curPage === 'network') renderNetwork();
    // Belt-and-suspenders: also refresh experts page on any session notification
    // (covers cases where session_update socket event is missed)
    if (['session_confirmed','session_declined','session_cancelled','session_rescheduled','session_booked'].includes(data?.type)) {
      apiInvalidate('/api/sessions');
      apiInvalidate('/api/experts');
      if (curPage === 'experts') renderExperts();
    }
  });

  // ── REAL-TIME FEED EVENTS ──────────────────────────────────────────────────
  socket.on('new_post', p => {
    // New post: invalidate trending so right sidebar refreshes
    apiInvalidate('/api/trending');
    if (curPage !== 'home') return;
    // Dedup: if this is our own recently submitted post, skip (already added locally)
    if (window._myRecentPosts?.has(p.id)) { window._myRecentPosts.delete(p.id); return; }
    const feed = document.getElementById('feed'); if (!feed) return;
    if (feed.querySelector('#pc-' + p.id)) return; // already in DOM (race-condition guard)
    const div = document.createElement('div');
    div.innerHTML = renderPost(p);
    const newCard = div.firstElementChild;
    feed.insertBefore(newCard, feed.firstChild);
    setTimeout(_sendVisiblePostViews, 500);
    // Show "new post" pulse on sort-new button to nudge user
    const rnBtn = document.getElementById('sort-new');
    if (rnBtn) { rnBtn.style.animation = 'pulse 0.6s 2'; setTimeout(() => { if(rnBtn) rnBtn.style.animation = ''; }, 1200); }
    // Refresh right sidebar trending
    setTimeout(() => { if (curPage === 'home') renderRightSidebar(); }, 1500);
  });

  socket.on('post_deleted', ({ postId }) => {
    document.getElementById('pc-' + postId)?.remove();
  });

  socket.on('post_liked', ({ postId, likes_count }) => {
    const card = document.getElementById('pc-' + postId); if (!card) return;
    const btn = card.querySelector('.pact');
    if (btn && !btn.classList.contains('liked')) {
      // Only update count display — don't flip liked state for this user
      const icon = btn.querySelector('i')?.outerHTML || '<i class="far fa-heart"></i>';
      btn.innerHTML = `${icon} ${likes_count}`;
    }
  });

  socket.on('post_commented', ({ postId, comments_count }) => {
    const card = document.getElementById('pc-' + postId); if (!card) return;
    const btns = card.querySelectorAll('.pact');
    if (btns[1]) btns[1].innerHTML = `<i class="far fa-comment"></i> ${comments_count}`;
    const pd = postsData.find(p => p.id === postId);
    if (pd) pd.comment_count = comments_count;
  });

  socket.on('post_edited', ({ postId, content }) => {
    const body = document.querySelector('#pc-' + postId + ' .post-body');
    if (body) body.textContent = content;
  });

  socket.on('message_edited', ({ id, content }) => {
    const bub = document.querySelector('[data-mid="' + id + '"]');
    if (bub) {
      const textNode = bub.firstChild;
      if (textNode && textNode.nodeType === Node.TEXT_NODE) textNode.textContent = content;
      else { const foot = bub.querySelector('.bub-foot'); if (foot) bub.insertBefore(document.createTextNode(content), foot); }
      const ed = bub.querySelector('.edited-label');
      if (!ed) { const foot = bub.querySelector('.bub-foot'); if (foot) { const s = document.createElement('span'); s.className = 'edited-label'; s.style.cssText='font-size:10px;opacity:.5;margin-right:4px'; s.textContent='edited'; foot.prepend(s); } }
    }
  });

  socket.on('mentor_slot_booked', ({ expertId, sessionId, slots }) => {
    apiInvalidate('/api/experts');
    apiInvalidate('/api/mentor-sessions');
    if (curPage === 'experts') { renderExperts(); return; }
    if (expertId) {
      const card = document.querySelector('[data-expert="' + expertId + '"]');
      if (card) {
        const free = (slots || []).filter(s => !s.booked).length;
        const total = (slots || []).length;
        const el = card.querySelector('.slot-count');
        if (el) { el.textContent = free + ' of ' + total + ' slots available'; el.style.color = free ? '#22c55e' : '#ef4444'; }
        if (free === 0) card.style.display = 'none';
      }
    }
    // Refresh open booking modal live so slot rows update without close/reopen
    const modal = document.querySelector('#mbg .modal');
    if (modal && (slots||[]).length) {
      const header = modal.querySelector('h2');
      if (header && header.textContent.startsWith('Book:')) {
        const slotContainer = modal.querySelector('[style*="max-height:340px"]');
        if (slotContainer) {
          slotContainer.innerHTML = (slots||[]).map(function(s) {
            const label = new Date(s.key).toLocaleString('en-IN', { weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
            if (s.booked) return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--r-sm);border:1.5px solid #fecaca;background:#fef2f2;margin-bottom:8px"><span style="font-size:13px;color:#ef4444;text-decoration:line-through">' + label + '</span><span style="font-size:11px;color:#ef4444;font-weight:700">Booked</span></div>';
            return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--r-sm);background:var(--indigo-light);border:1.5px solid var(--primary);margin-bottom:8px"><span style="font-size:13px;font-weight:600">' + label + '</span><span class="btn btn-p btn-sm" style="pointer-events:none">Select</span></div>';
          }).join('');
        }
      }
    }
  });

  socket.on('session_update', ({ sessionId, status, meta, cancelledBy }) => {
    apiInvalidate('/api/sessions');
    apiInvalidate('/api/experts');
    apiInvalidate('/api/mentor-sessions');
    if (curPage === 'experts') renderExperts();
    pollBadges();
    if (status === 'confirmed') {
      toast('✅ Your session was accepted!');
    } else if (status === 'cancelled' && meta) {
      const dt = meta.scheduledAt ? new Date(meta.scheduledAt).toLocaleString('en-IN',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      const whoName = cancelledBy === 'learner' ? (meta.learnerName||'Someone') : (meta.expertName||'Someone');
      const otherName = cancelledBy === 'learner' ? meta.expertName : meta.learnerName;
      const titleLine = meta.title ? escHtml(meta.title) : 'Mentorship Session';
      const otherLine = otherName ? '<p style="margin:0 0 4px;color:var(--sub)"><i class="fas fa-user" style="width:14px;color:#ef4444"></i> with ' + escHtml(otherName) + '</p>' : '';
      const dtLine = dt ? '<p style="margin:0 0 4px;color:var(--sub)"><i class="fas fa-calendar" style="width:14px;color:#ef4444"></i> ' + dt + '</p>' : '';
      showModal('<div style="text-align:center;padding:16px 0 8px">'
        + '<div style="font-size:44px;margin-bottom:10px">🚫</div>'
        + '<h2 style="margin:0 0 6px;color:#ef4444">Session Cancelled</h2>'
        + '<p style="color:var(--sub);font-size:13px;margin-bottom:18px">' + escHtml(whoName) + ' has cancelled the following session:</p>'
        + '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:var(--r-sm);padding:14px 16px;text-align:left;margin-bottom:20px;font-size:13px">'
        + '<p style="margin:0 0 6px;font-weight:700;font-size:15px">' + titleLine + '</p>'
        + otherLine + dtLine
        + '<p style="margin:8px 0 0;color:#22c55e;font-size:12px"><i class="fas fa-unlock-alt"></i> The time slot has been freed up</p>'
        + '</div>'
        + '<button class="btn btn-p" style="width:100%;justify-content:center" onclick="closeModal()">OK, got it</button>'
        + '</div>');
    } else if (status === 'cancelled') {
      toast('🚫 A session was cancelled.');
    } else if (status === 'rescheduled' && meta) {
      const dt = meta.scheduledAt ? new Date(meta.scheduledAt).toLocaleString('en-IN',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      showModal('<div style="text-align:center;padding:16px 0 8px">'
        + '<div style="font-size:44px;margin-bottom:10px">📅</div>'
        + '<h2 style="margin:0 0 6px">Session Rescheduled</h2>'
        + '<p style="color:var(--sub);font-size:13px;margin-bottom:18px">' + escHtml(meta.learnerName||'A learner') + ' has rescheduled to a new time:</p>'
        + '<div style="background:var(--indigo-light);border-radius:var(--r-sm);padding:14px 16px;text-align:left;margin-bottom:20px;font-size:13px">'
        + '<p style="margin:0 0 6px;font-weight:700;font-size:15px"><i class="fas fa-calendar-alt" style="color:var(--primary);margin-right:6px"></i>' + (dt||'New time') + '</p>'
        + '<p style="margin:4px 0 0;color:#f59e0b;font-size:12px;font-weight:600"><i class="fas fa-clock"></i> Awaiting your confirmation</p>'
        + '</div>'
        + '<button class="btn btn-p" style="width:100%;justify-content:center" onclick="closeModal();if(curPage===\'experts\')renderExperts()">View Bookings</button>'
        + '</div>');
    }
  });

  // Mentor session created/edited/deleted — refresh experts list for all users
  socket.on('experts_updated', () => {
    apiInvalidate('/api/experts');
    apiInvalidate('/api/mentor-sessions');
    if (curPage === 'experts') renderExperts();
  });

  // Real-time analytics — profile viewed or post engaged
  socket.on('analytics_update', () => {
    apiInvalidate('/api/analytics/me');
    // Bypass client cache with direct fetch to always get live data
    fetch('/api/analytics/me', { headers: { Authorization: 'Bearer ' + token } })
      .then(r => r.json()).then(a => {
        if (!a || a.error) return;
        const v = document.getElementById('sb-views'); if (v) v.textContent = a.profile_views ?? 0;
        const i = document.getElementById('sb-impr'); if (i) i.textContent = a.post_impressions ?? 0;
        const rsA = document.getElementById('rs-analytics');
        if (rsA) {
          const rv = rsA.querySelector('.stat-val[data-key="views"]'); if (rv) rv.textContent = a.profile_views ?? 0;
          const ri = rsA.querySelector('.stat-val[data-key="impr"]'); if (ri) ri.textContent = a.post_impressions ?? 0;
        }
      }).catch(() => {});
  });

  socket.on('post_reacted', ({ postId, reactions, my_reaction_by }) => {
    const rc = document.querySelector('#pc-' + postId + ' .react-counts');
    if (rc) rc.innerHTML = _renderRxCounts(reactions);
    // Update in-memory postsData reaction count for eventual sort consistency
    const pd = postsData.find(p => p.id === postId);
    if (pd) {
      pd.reaction_count = reactions.reduce((s, r) => s + (r.count || 0), 0);
      pd.reactions = reactions;
    }
    // Re-sort feed if on Top mode (debounced)
    if (_feedSort !== 'new') {
      clearTimeout(window._rsortTimer);
      window._rsortTimer = setTimeout(() => {
        if (_feedSort !== 'new' && postsData.length > 1) {
          postsData.sort((a, b) => (b.reaction_count||0) - (a.reaction_count||0) || (b.comment_count||0) - (a.comment_count||0));
          renderFeed(postsData);
        }
      }, 2000); // 2s debounce so UI doesn't jump immediately
    }
  });

  socket.on('account_action', ({ type, message, until }) => {
    if (type === 'disabled') {
      showModal(`<div style="text-align:center;padding:16px 0">
        <i class="fas fa-ban" style="font-size:48px;color:#ef4444;margin-bottom:12px;display:block"></i>
        <h2 style="color:#ef4444;margin-bottom:8px">Account Disabled</h2>
        <p style="color:var(--sub);font-size:14px;line-height:1.5">${escHtml(message)}</p>
        <p style="color:var(--sub);font-size:12px;margin-top:8px">You will be signed out in a few seconds.</p>
      </div>`);
      setTimeout(logout, 4000);
    } else if (type === 'blocked') {
      showModal(`<div style="text-align:center;padding:16px 0">
        <i class="fas fa-clock" style="font-size:48px;color:#f59e0b;margin-bottom:12px;display:block"></i>
        <h2 style="color:#f59e0b;margin-bottom:8px">Account Suspended</h2>
        <p style="color:var(--sub);font-size:14px;line-height:1.5">${escHtml(message)}</p>
        ${until ? `<p style="font-size:12px;color:var(--sub);margin-top:8px">Until: ${new Date(until).toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</p>` : ''}
        <p style="font-size:12px;color:var(--sub);margin-top:4px">You will be signed out now.</p>
      </div>`);
      setTimeout(logout, 5000);
    } else if (type === 'warning') {
      const w = document.createElement('div');
      w.className = 'acct-warn';
      w.innerHTML = `<div style="display:flex;gap:10px;align-items:flex-start">
        <i class="fas fa-exclamation-triangle" style="color:#f59e0b;font-size:18px;flex-shrink:0;margin-top:2px"></i>
        <div style="flex:1">
          <strong style="font-size:13px;color:#92400e;display:block;margin-bottom:4px">⚠️ Content Warning</strong>
          <p style="font-size:12px;color:#78350f;margin:0;line-height:1.5">${escHtml(message)}</p>
        </div>
        <button onclick="this.closest('.acct-warn').remove()" style="background:none;border:none;cursor:pointer;color:#78350f;font-size:18px;line-height:1;flex-shrink:0">×</button>
      </div>`;
      document.body.appendChild(w);
      setTimeout(() => w.remove(), 9000);
    }
  });

  socket.on('poll_voted', ({ postId, options }) => {
    const card = document.getElementById('pc-' + postId); if (!card) return;
    const tot = options.reduce((s, o) => s + (o.votes_count || 0), 0);
    // Only update if user hasn't voted (no user_vote state in DOM means they can still vote)
    // If results bars visible update them; if still showing buttons, keep buttons (user hasn't voted yet)
    const bars = card.querySelectorAll('.poll-bar');
    if (bars.length) {
      // Results already showing — update percentages
      options.forEach((o, i) => {
        const pct = tot ? Math.round(o.votes_count / tot * 100) : 0;
        if (bars[i]) bars[i].style.width = pct + '%';
        const row = bars[i]?.closest('.poll-opt');
        if (row) {
          const strong = row.querySelector('strong');
          if (strong) strong.textContent = pct + '%';
        }
      });
      const vtxt = card.querySelector('.poll-opt')?.closest('div')?.querySelector('p');
      if (vtxt) vtxt.textContent = `${tot} vote${tot !== 1 ? 's' : ''}`;
    }
  });
}
function updatePresence(uid) {
  const online = window._online?.has(String(uid));
  const wrap = document.getElementById('ctop-pres');
  if (wrap) wrap.classList.toggle('online', !!online);
  const sub = document.getElementById('ctop-sub');
  if (sub && uid == achat) sub.textContent = online ? 'Active now' : (sub.dataset.hl || '');
}
async function refreshThreads() {
  const ml = document.getElementById('ml'); if (!ml) return;
  apiInvalidate('/api/messages/threads'); // always fetch fresh on real-time update
  const th = await api('/api/messages/threads');
  if (!Array.isArray(th) || !th.length) return;
  ml.innerHTML = th.map(t => `<div class="mthread${t.id==achat?' active':''}" id="mt-${t.id}" onclick="openChat(${t.id},'${String(t.name).replace(/'/g,"&apos;")}')">${av(t,'av40')}<div class="mi"><h5>${t.name}</h5><p>${t.last_message||''}</p></div>${t.unread_count>0?`<div class="udot">${t.unread_count>99?'99+':t.unread_count}</div>`:''}</div>`).join('');
}
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
async function pollBadges() {
  apiInvalidate('/api/notifications/badges');
  const r = await api('/api/notifications/badges').catch(() => ({}));
  if (r.unread_notifications > 0) updBadge('nbadge', r.unread_notifications); else updBadge('nbadge', 0);
  if (r.unread_messages > 0) updBadge('mbadge', r.unread_messages); else updBadge('mbadge', 0);
  // Show dot on Network tab if there are pending connection requests
  if (r.pending_connections > 0) updBadge('connbadge', r.pending_connections); else updBadge('connbadge', 0);
}

// ── AUTH ──────────────────────────────────────────────────────────────────
