# /etc/nginx/sites-available/nexus
server {
    listen 80;
    server_name yournexus.com www.yournexus.com;

    # Redirect HTTP → HTTPS (after certbot sets up SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yournexus.com www.yournexus.com;

    ssl_certificate     /etc/letsencrypt/live/yournexus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yournexus.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload size limit (for avatars/banners)
    client_max_body_size 10M;

    # Serve uploaded files directly (bypass Node for static assets)
    location /uploads/ {
        alias /var/www/nexus/public/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Socket.IO (must proxy WebSocket upgrades)
    location /socket.io/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API — no caching
    location /api/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Everything else → Node (serves index.html SPA)
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
